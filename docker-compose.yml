services:
  gateway:
    image: traefik:v3.1
    command:
      - "--providers.file.filename=/traefik_dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "8088:8080"
    volumes:
      - ./traefik_dynamic.yml:/traefik_dynamic.yml:ro
    networks:
      - foodflow-network

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order
      POSTGRES_DB: orderdb
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "order"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - foodflow-network

  order-service:
    build: ./order-service
    ports:
      - "8081:8080"
    environment:
      DB_HOST: order-db
      PAYMENT_URL: http://payment-service:3000
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - foodflow-network

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
      POSTGRES_DB: paymentdb
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "payment"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - foodflow-network

  payment-service:
    build: ./payment-service
    environment:
      DATABASE_URL: "postgresql://payment:payment@payment-db:5432/paymentdb?schema=public"
    depends_on:
      payment-db:
        condition: service_healthy
    networks:
      - foodflow-network

  # ==========================================
  # 🚀 NOUVEAUX SERVICES TP4 : KAFKA & KAFKA-UI
  # ==========================================
  kafka:
    image: apache/kafka:4.3.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - foodflow-network

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - foodflow-network

  # Conteneur éphémère pour initialiser les topics automatiquement
  kafka-init:
    image: apache/kafka:4.3.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "Création des topics Kafka pour FoodFlow..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic orders.events --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payments.events --partitions 3 --replication-factor 1
        echo "Topics créés avec succès !"
    networks:
      - foodflow-network

networks:
  foodflow-network:
    driver: bridge

volumes:
  order-db-data:
  payment-db-data: